<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Testable Profile Card</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<article data-testid="test-profile-card">
  <figure>
    <img
      src="./images/WhatsApp Image 2025-11-11 at 12.39.43 PM.jpeg"
      alt="Usimeke's Portrait" height="300px"
      data-testid="test-user-avatar"
    />
    <figcaption>Usimeke Usoroh</figcaption>
  </figure>

  <div class="content">
    <header>
      <h2 data-testid="test-user-name">Usimeke Usoroh</h2>
    </header>

    <p data-testid="test-user-bio">
      A frontend developer passionate about building accessible and user-friendly web interfaces.
    </p>

    <p data-testid="test-user-time" aria-live="polite"></p>

    <nav data-testid="test-user-social-links" aria-label="Social links">
      <a href="https://x.com/IAMUsimeke" target="_blank" rel="noopener noreferrer" data-testid="test-user-social-twitter">Twitter</a>
      <a href="https://github.com/dashboard" target="_blank" rel="noopener noreferrer" data-testid="test-user-social-github">GitHub</a>
    </nav>

    <section>
      <h3>Hobbies</h3>
      <ul data-testid="test-user-hobbies">
        <li>Coding</li>
        <li>Music</li>
        <li>Traveling</li>
      </ul>
    </section>

    <section>
      <h3>Dislikes</h3>
      <ul data-testid="test-user-dislikes">
        <li>Spam emails</li>
        <li>Slow internet</li>
      </ul>
    </section>
  </div>
</article>

<script>
  const timeEl = document.querySelector('[data-testid="test-user-time"]');

  function updateTime() {
    timeEl.textContent = Date.now();
  }

  updateTime();
  setInterval(updateTime, 1000);
</script>

</body>
</html>
